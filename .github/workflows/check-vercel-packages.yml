name: Check Vercel Package Sync

on:
  push:
    paths:
      - 'artifacts/artmap-college/package.json'
      - 'artifacts/artmap-college/package.vercel.json'
      - 'pnpm-workspace.yaml'
  pull_request:
    paths:
      - 'artifacts/artmap-college/package.json'
      - 'artifacts/artmap-college/package.vercel.json'
      - 'pnpm-workspace.yaml'

jobs:
  check-packages:
    name: Verify package.vercel.json is in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check package.json vs package.vercel.json
        run: node .github/scripts/check-vercel-packages.js