kind = "web"
previewPath = "/"
title = "ArtMap College"
version = "1.0.0"
id = "artifacts/artmap-college"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21357

[services.development]
run = "pnpm --filter @workspace/artmap-college run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/artmap-college", "run", "build" ]
publicDir = "artifacts/artmap-college/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21357"
BASE_PATH = "/"
