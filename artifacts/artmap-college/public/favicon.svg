<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="42%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#04080f"/>
    </radialGradient>
  </defs>

  <!-- Square background with rounded corners -->
  <rect width="180" height="180" rx="38" fill="url(#bg)"/>

  <!-- Globe circle -->
  <circle cx="90" cy="93" r="62" fill="none" stroke="#D4AF37" stroke-width="3.5"/>

  <!-- Equator -->
  <ellipse cx="90" cy="93" rx="62" ry="22" fill="none" stroke="#D4AF37" stroke-width="2.2" opacity="0.45" clip-path="url(#c)"/>

  <!-- Prime meridian -->
  <line x1="90" y1="31" x2="90" y2="155" stroke="#D4AF37" stroke-width="2.2" opacity="0.45" clip-path="url(#c)"/>

  <clipPath id="c"><circle cx="90" cy="93" r="62"/></clipPath>

  <!-- Artistic brushstroke arc above globe -->
  <path d="M 38 50 Q 65 34 96 42 Q 122 50 142 38"
    fill="none" stroke="#D4AF37" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>

  <!-- Compass arrow tip -->
  <path d="M 142 38 L 154 24 L 150 42 Z" fill="#D4AF37" opacity="0.85"/>

  <!-- Active location dot with ring -->
  <circle cx="112" cy="82" r="8" fill="#D4AF37" opacity="0.95"/>
  <circle cx="112" cy="82" r="13" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
</svg>
